<!DOCTYPE html>
<html>
<head>
    <title>VortexIA SaaS</title>
</head>
<body>
    <h1>VortexIA - Geração Automática de Vídeos</h1>
    <form method="POST" enctype="multipart/form-data">
        <label>Envie seu áudio (MP3):</label><br>
        <input type="file" name="audio" accept="audio/*" required><br><br>

        <label>Formato do vídeo:</label><br>
        <select name="format">
            <option value="tiktok">TikTok (Vertical)</option>
            <option value="youtube">YouTube (Horizontal)</option>
        </select><br><br>

        <button type="submit">Gerar Vídeo</button>
    </form>
</body>
</html>
